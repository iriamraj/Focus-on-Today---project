<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus on Today</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <h2>Focus on <span>Today</span></h2>
    </header>
    <main>
      <h2 class="main-heading">
        Today <img id="sunImg" src="images/Sun.svg" />
      </h2>
      <p class="motivationText">Raise the bar by completing your goals!</p>
      <div class="progress-bar-holder">
        <div class="progress-bar">
          <div class="tast-doing"><span>2</span>/<span>3</span> Completed</div>
        </div>
      </div>
      <p class="error">Please set all the 3 goals!</p>
      <div class="goal-holder">
        <div>
          <div class="tick-mark">
            <img src="images/Tick.svg" alt="tick" />
          </div>
        </div>
        <input
          id="inp1"
          class="goal-iput"
          type="text"
          placeholder="Add new goal... "
        />
      </div>
      <div class="goal-holder">
        <div>
          <div class="tick-mark">
            <img src="images/Tick.svg" alt="tick" />
          </div>
        </div>
        <input
          id="inp2"
          class="goal-iput"
          type="text"
          placeholder="Add new goal... "
        />
      </div>
      <div class="goal-holder">
        <div>
          <div class="tick-mark">
            <img src="images/Tick.svg" alt="tick" />
          </div>
        </div>
        <input
          id="inp3"
          class="goal-iput"
          type="text"
          placeholder="Add new goal... "
        />
      </div>
      <button class="save">Save</button>
      <p class="motivation-text2">“Move one step ahead, today!”</p>
      <p class="love">Made with ❤️ by Raj Mallick</p>
    </main>
  </body>
</html>
